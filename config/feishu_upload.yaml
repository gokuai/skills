# 飞书文件自动上传配置

# 飞书配置
feishu:
  # 飞书应用凭证
  app_id: "YOUR_APP_ID"
  app_secret: "YOUR_APP_SECRET"
  
  # 要监听的群聊 ID（从飞书群 URL 或事件 payload 获取）
  # 格式：chat_xxxxxxxxxxxxx
  chat_id: "chat:YOUR_CHAT_ID"

# 够快云库配置（复用 goukuai.yaml）
goukuai:
  config_file: "config/goukuai.yaml"

# 上传配置
upload:
  # 目标文件夹路径
  target_folder: "销售支持"
  
  # 文件类型过滤（空表示全部上传）
  # 支持扩展名或 MIME 类型
  file_types: []  # ["pdf", "docx", "xlsx", "doc", "xls"]
  
  # 文件大小限制（MB，0 表示无限制）
  max_size_mb: 100
  
  # 是否保留原文件名
  keep_original_name: true
  
  # 文件名前缀（可选，用于分类）
  # name_prefix: "{date}_"  # 例如：2026-03-11_文件名

# 通知配置
notification:
  # 是否在群里发送上传通知
  enabled: true
  
  # 通知模板
  template: "✅ 已上传：{filename} → 够快云库/销售支持/"

# 日志配置
logging:
  # 日志文件路径
  file: "logs/feishu_upload.log"
  
  # 日志级别：DEBUG, INFO, WARNING, ERROR
  level: "INFO"
